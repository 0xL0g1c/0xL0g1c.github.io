<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0xL0gic | Cyber Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00FF8C;
            --neon-blue: #00D9FF;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --bg-dark: #0a0a0c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            margin: 0;
            overflow-x: hidden;
        }

        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 10, 12, 0.85);
            z-index: -1;
        }

        nav {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 255, 140, 0.1);
            background: rgba(10, 10, 12, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Fira Code', monospace;
            font-size: 1.5rem;
            color: var(--neon-green);
            font-weight: 600;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--neon-blue);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .hero {
            text-align: center;
            padding: 80px 0;
        }

        .hero h1 {
            font-family: 'Fira Code', monospace;
            font-size: 4rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        section {
            margin-bottom: 60px;
        }

        h2 {
            font-family: 'Fira Code', monospace;
            font-size: 2rem;
            color: var(--neon-blue);
            margin-bottom: 25px;
            display: inline-block;
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 5px;
        }

        h2::before {
            content: "> ";
            color: var(--neon-green);
        }

        .card {
            background-color: rgba(20, 20, 24, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 140, 0.1);
            transform: translateY(-2px);
            background-color: rgba(20, 20, 24, 0.6);
        }

        .card h3 {
            color: var(--neon-green);
            font-family: 'Fira Code', monospace;
            margin-bottom: 10px;
        }

        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-tag {
            background: rgba(0, 217, 255, 0.1);
            color: var(--neon-blue);
            padding: 8px 15px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 217, 255, 0.2);
            backdrop-filter: blur(4px);
        }

        ul.custom-list {
            list-style: none;
        }

        ul.custom-list li {
            margin-bottom: 10px;
            padding-left: 20px;
            position: relative;
        }

        ul.custom-list li::before {
            content: "▹";
            position: absolute;
            left: 0;
            color: var(--neon-green);
        }

        ul.custom-list li a, .project-github-link {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.3s ease;
        }
